<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="theme-color" content="#2C2C2C" />
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">

    <title>CBA-Worker Edition</title>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='15' y='5' width='70' height='90' rx='5' ry='5' fill='%238B5D33' stroke='%23663300' stroke-width='2'/%3E%3Crect x='22' y='12' width='56' height='75' fill='%23FFFFFF' stroke='%23000000' stroke-width='1'/%3E%3Ctext x='50' y='63' font-size='50' text-anchor='middle' fill='%23000000'%3E%E5%A7%9C%3C/text%3E%3C/svg%3E">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #2C2C2C;
            --surface-color: #424242;
            --text-color: #ffffff;
            --primary-color: #007bff;
            --danger-color: #d33;
            --info-color: #17a2b8;
            --warning-color: #ffc107;
            --border-color-default: skyblue;
            --border-color-composing: orange;
            --border-color-pasted: red;
            --border-color-duplicate: red;
            --border-color-copied: limegreen;
            --border-color-cut: red;
        }

        html {
            scrollbar-gutter: stable;
            overscroll-behavior-y: contain;
        }

        body {
            width: 100%;
            overflow-x: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Sans JP', sans-serif;
            overscroll-behavior-y: contain;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #search-input,
        #text-input,
        .swal2-input,
        .swal2-textarea {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255, 255, 255, 0.5);
        }

        .post-it {
            width: 80%;
            margin: 10px auto;
            border-radius: 8px;
            background-color: var(--surface-color);
            color: var(--text-color);
            padding: 10px 45px 10px 15px;
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out, opacity 0.2s ease-in-out;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            touch-action: pan-y;
        }

        .post-it-content {
            white-space: pre-wrap;
            word-break: break-all;
            display: -webkit-box;
            line-clamp: 4;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .post-it:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .post-it.dragging {
            position: absolute;
            opacity: 0.95;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            cursor: grabbing;
            transition: none;
            pointer-events: none;
        }

        .post-it.drag-over {
            opacity: 0.5;
        }

        .post-it-placeholder {
            width: 80%;
            margin: 10px auto;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.4);
            box-sizing: border-box;
            transition: none;
        }

        .post-it.active {
            transform: scale(1.02);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
            transition-duration: 0.1s;
        }

        .post-it.swiping {
            transition: none;
        }

        .post-it.returning {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .post-it.deleting {
            animation: fadeOutAndShrink 0.4s ease-out forwards;
        }

        @keyframes fadeOutAndShrink {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.5);
                margin-top: -10px;
                margin-bottom: -10px;
                padding-top: 0;
                padding-bottom: 0;
            }
        }

        .post-it-more-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 11;
            transition: all 0.2s;
            opacity: 0;
            pointer-events: none;
        }

        .post-it:hover .post-it-more-btn {
            opacity: 1;
            pointer-events: auto;
        }

        .post-it-more-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .post-it-controls {
            position: absolute;
            top: 44px;
            right: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: scale(0.8) translateY(-10px);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            pointer-events: none;
        }

        .post-it:has(.post-it-controls.visible) {
            z-index: 20;
        }

        .post-it-controls.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        .post-it-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.6);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .post-it-btn:hover {
            transform: scale(1.15);
        }

        .post-it-btn.delete:hover {
            background-color: rgba(255, 59, 48, 0.8);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .post-it-btn.edit:hover {
            background-color: rgba(52, 199, 89, 0.8);
            border-color: rgba(255, 255, 255, 0.5);
        }

        #post-it-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1050;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }

        .custom-toast {
            pointer-events: auto;
            background-color: var(--surface-color);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        .custom-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .custom-toast-body .btn-undo {
            margin-left: 15px;
            border: 1px solid #fff;
            background: transparent;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .custom-toast-body .btn-undo:hover {
            background-color: #fff;
            color: #000;
        }

        .btn {
            margin: 5px;
        }

        .search-container {
            position: relative;
        }

        #search-input::-webkit-search-cancel-button {
            -webkit-appearance: none;
            appearance: none;
        }

        #search-input {
            padding-right: 35px;
        }

        #search-input,
        #text-input {
            background-color: var(--surface-color);
            color: var(--text-color);
            border: 1px solid #555;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        #search-input::placeholder {
            color: #aaa;
        }

        #search-input:focus,
        #text-input:focus {
            background-color: var(--surface-color);
            color: var(--text-color);
            border-color: var(--border-color-default);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2), 0 0 0 2px var(--focus-outline-color);
            outline: none;
        }

        #search-clear-btn {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%) scale(0.5);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease-in-out;
        }

        #search-clear-btn.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(-50%) scale(1);
        }

        #search-clear-btn:hover {
            color: rgba(255, 255, 255, 0.8);
            background-color: rgba(255, 255, 255, 0.2);
        }

        .btn-toggle {
            background-color: #5a5a5a;
            border-color: #5a5a5a;
            color: #ccc;
        }

        .btn-toggle.toggled {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.5);
        }

        .text-center {
            display: flex;
            justify-content: center;
            flex-wrap: nowrap;
        }

        .text-center .btn {
            flex-basis: 0;
            flex-grow: 1;
            width: auto;
            height: 3rem;
        }

        #delete-btn {
            color: white;
        }

        #delete-btn:hover {
            color: white;
        }

        #text-input {
            height: auto;
            resize: none;
            overflow-y: hidden;
            border: 2px solid var(--border-color-default);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        #text-input.composing {
            border-color: var(--border-color-composing);
        }

        #text-input.empty {
            border-color: var(--border-color-default);
        }

        #text-input.pasted {
            border-color: var(--border-color-pasted);
        }

        #text-input.duplicate {
            border-color: var(--border-color-duplicate);
        }

        #text-input.copied {
            border-color: var(--border-color-copied);
        }

        #text-input.cut {
            border-color: var(--border-color-cut);
        }

        .cbassist-header {
            background: linear-gradient(to right, #333 0%, var(--bg-color));
            color: #ffffff;
            padding: 10px 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .cbassist-header::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.2) 0%, transparent);
            filter: blur(5px);
            z-index: -1;
        }

        .cbassist-header>span {
            font-size: 22px;
            font-weight: 600;
        }

        .header-buttons-left {
            display: flex;
            gap: 8px;
        }

        .header-buttons-left .btn {
            width: 38px;
            height: 38px;
            padding: 0;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            margin: 0;
        }

        .icon-wrapper .emoji-icon {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .container {
            animation: fadeIn 0.5s ease-in-out;
            margin-bottom: 20px;
        }

        footer {
            width: 100%;
            margin: 0;
            padding: 40px 15px 20px 15px;
            text-align: center;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
        }

        footer a {
            pointer-events: auto;
        }

        footer.fade-out {
            opacity: 0;
        }

        #scroll-to-top-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background-color: rgba(0, 123, 255, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 1040;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        #scroll-to-top-btn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        #scroll-to-top-btn:hover {
            background-color: var(--primary-color);
        }

        .swal2-popup {
            background-color: var(--bg-color) !important;
            color: var(--text-color) !important;
            border-radius: 12px !important;
        }

        .swal2-title {
            color: var(--text-color) !important;
        }

        .swal2-html-container {
            color: #ccc !important;
            text-align: left !important;
            line-height: 1.6 !important;
        }

        .swal2-html-container .swal-key-warning {
            color: var(--warning-color);
            font-weight: bold;
            display: block;
            margin-top: 10px;
            background-color: rgba(255, 193, 7, 0.1);
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid var(--warning-color);
        }

        .swal2-input,
        .swal2-textarea,
        .swal2-file {
            background-color: var(--surface-color) !important;
            color: var(--text-color) !important;
            border: 1px solid #777 !important;
        }

        #swal-ack-checkbox {
            margin-right: 5px;
        }

        .swal2-confirm {
            background-color: var(--primary-color) !important;
        }

        .swal2-cancel {
            background-color: var(--danger-color) !important;
        }

        .swal2-deny.swal2-styled.btn-preserve {
            background-color: var(--info-color) !important;
            color: white !important;
        }

        @media (max-width: 1290px) {
            .container {
                width: 100%;
                margin: 0 auto 20px;
                padding-left: 15px;
                padding-right: 15px;
            }

            .btn {
                font-size: 14px;
            }

            .text-center .btn {
                flex-grow: 1;
                width: auto;
            }

            .cbassist-header>span {
                font-size: 20px;
            }

            footer {
                font-size: 12px;
            }
        }

        @media (forced-colors: active) {
            .btn {
                border: 1px solid ButtonText;
            }
        }
    </style>
</head>

<body>
    <div class="cbassist-header fade-in">
        <div class="header-buttons-left">
            <button id="backup-btn" class="btn btn-info" title="гГРгГГгВѓгВҐгГГгГЧ" aria-label="гГРгГГгВѓгВҐгГГгГЧ">
                <span class="icon-wrapper"><i class="bi bi-save"></i><span class="emoji-icon">рЯТЊ</span></span>
            </button>
            <button id="restore-btn" class="btn btn-warning" title="еЊ©еЕГ" aria-label="еЊ©еЕГ">
                <span class="icon-wrapper"><i class="bi bi-folder2-open"></i><span class="emoji-icon">рЯУВ</span></span>
            </button>
            <button id="toggle-autocopy-btn" class="btn btn-toggle" title="иЗ™еЛХгВ≥гГФгГЉ On/Off" aria-label="иЗ™еЛХгВ≥гГФгГЉеИЗгВКжЫњгБИ">
                <span class="icon-wrapper"><i class="bi bi-clipboard-check"></i><span
                        class="emoji-icon">рЯУЛ</span></span>
            </button>
            <button id="toggle-newline-btn" class="btn btn-toggle" title="EnterгБІжФєи°М On/Off" aria-label="EnterгБІжФєи°МеИЗгВКжЫњгБИ">
                <span class="icon-wrapper"><i class="bi bi-text-paragraph"></i><span class="emoji-icon">¬ґ</span></span>
            </button>
        </div>
        <span>CBA-WE</span>
    </div>

    <div class="container mt-3">
        <div class="search-container">
            <input type="search" id="search-input" class="form-control mb-2" placeholder="гГЭгВєгГИеЖЕеЃєж§ЬзіҐвА¶" autocomplete="off" data-lpignore="true" data-1p-ignore="true">
            <span id="search-clear-btn"><i class="bi bi-x-circle-fill"></i></span>
        </div>
        <textarea id="text-input" class="form-control" rows="4" style="width: 100%;" aria-label="жЦ∞и¶ПгГЭгВєгГИгБЃеЖЕеЃєеЕ•еКЫ" autocomplete="off" data-lpignore="true" data-1p-ignore="true"></textarea>
        <div class="text-center">
            <button id="delete-btn" class="btn btn-primary mt-2">гВѓгГ™гВҐ</button>
            <button id="save-btn" class="btn btn-success mt-2">дњЭе≠Ш</button>
            <button id="delete-all-btn" class="btn btn-danger mt-2">еЕ®гБ¶еЙКйЩ§</button>
        </div>
    </div>
    <div id="post-it-container" role="list"></div>
    <div id="toast-container"></div>
    <footer class="container mt-4 text-muted">Copyright ¬© 2025 D5 Kan. All Rights Reserved.<br><a
            class="text-muted text-decoration-none font-weight-bold" href="https://github.com/Hyonimix/CBA-WE"
            target="_blank">github.com/Hyonimix</a><br><a href="#" id="license-info-btn" class="text-muted text-decoration-none" style="font-size: 12px; margin-top: 5px; display: inline-block; text-decoration: underline !important;">Open Source Licenses</a></footer>

    <button id="scroll-to-top-btn" title="гГИгГГгГЧгБЄзІїеЛХ" aria-label="гГЪгГЉгВЄгБЃгГИгГГгГЧгБЄзІїеЛХ">
        <i class="bi bi-arrow-up-circle-fill"></i>
    </button>

    <script>
        /**
        * @license
        * Copyright ¬© 2025 D5 Kan (https://github.com/Hyonimix). All Rights Reserved.
        *
        * This software is the proprietary property of the copyright holder.
        * Without the express prior written consent of the copyright holder, any part of this file
        * may not be copied, modified, distributed, or sublicensed.
        */
        document.addEventListener('DOMContentLoaded', async () => {

            // DOM мЪФмЖМ кіАл¶ђ
            const dom = {
                header: document.querySelector('.cbassist-header'),
                searchInput: document.getElementById('search-input'),
                searchClearBtn: document.getElementById('search-clear-btn'),
                textInput: document.getElementById('text-input'),
                saveBtn: document.getElementById('save-btn'),
                deleteBtn: document.getElementById('delete-btn'),
                deleteAllBtn: document.getElementById('delete-all-btn'),
                backupBtn: document.getElementById('backup-btn'),
                restoreBtn: document.getElementById('restore-btn'),
                toggleAutocopyBtn: document.getElementById('toggle-autocopy-btn'),
                toggleNewlineBtn: document.getElementById('toggle-newline-btn'),
                postItContainer: document.getElementById('post-it-container'),
                toastContainer: document.getElementById('toast-container'),
                footer: document.querySelector('footer'),
                scrollToTopBtn: document.getElementById('scroll-to-top-btn'),
                licenseBtn: document.getElementById('license-info-btn')
            };

            // мХ± мГБнГЬ кіАл¶ђ
            let state = {
                postIts: [],
                settings: { isAutoCopyEnabled: false, isNewlineEnabled: true },
                lastCopiedText: '',
                typingTimer: null,
                isComposing: false,
                pastedByUser: false,
                cutByUser: false,
                undoableClearText: null,
                lastDeletedAll: null,
                lastDeletedItem: null,
                lastEditedItem: null,
                isModalOpen: false,
                blockNextClick: false,
                drag: {
                    target: null,
                    startX: 0,
                    startY: 0,
                    lastX: 0,
                    lastY: 0,
                    isSwiping: false,
                    isReordering: false,
                    isLongPress: false,
                    longPressTimer: null,
                    didMove: false,
                    placeholder: null,
                    scrollInterval: null,
                    grabOffsetX: 0,
                    grabOffsetY: 0,
                    initialWidth: 0,
                    initialHeight: 0,
                    angle: 0,
                    angularVelocity: 0,
                    targetAngle: 0,
                    lastFrameTime: null,
                    animationFrameId: null
                }
            };

            const MAX_POST_SIZE_BYTES = 96 * 1024;

            const postItColors = ["#c94a4a", "#c24185", "#9b4ab3", "#6a51b8", "#4455b1", "#2b74b5", "#288599", "#2a9d8f", "#3a8f4c", "#679436", "#a39b37", "#e9c46a", "#f4a261", "#e76f51", "#7c6a60", "#6f7479", "#455a64"];

            // л≥ім°∞ кЄ∞лК• л™®мЭМ
            const helpers = {
                // нЦЕнЛ± нФЉлУЬл∞± л∞ЬмГЭ
                triggerHapticFeedback(style = 'light') {
                    if (navigator.vibrate) {
                        try {
                            if (style === 'light') navigator.vibrate(20);
                            else if (style === 'medium') navigator.vibrate(40);
                            else if (style === 'heavy') navigator.vibrate([100, 30, 100]);
                            else if (style === 'success') navigator.vibrate([50, 50, 50]);
                            else if (style === 'error') navigator.vibrate([100, 50, 100, 50, 100]);
                        } catch (e) {
                        }
                    }
                },
                // нММмЭЉ лЛ§мЪіл°ЬлУЬ
                downloadBlob(blob, filename) {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }
            };

            // мХФнШЄнЩФ/л≥µнШЄнЩФ кЄ∞лК• л™®мЭМ
            const cryptoHelper = {
                _fixedKeyInstance: null,
                // к≥†м†Х мХФнШЄнЩФ нВ§ мГЭмД±/к∞Ам†ЄмШ§кЄ∞
                async getFixedKey() {
                    if (this._fixedKeyInstance) return this._fixedKeyInstance;
                    const jwk = { "kty": "oct", "k": "a7b2E6vK8zT9hG3qC1fJ0sR5uW8xP4oI7dF6kM9nL4g", "alg": "A256GCM", "ext": true };
                    this._fixedKeyInstance = await crypto.subtle.importKey('jwk', jwk, { name: 'AES-GCM' }, true, ['encrypt', 'decrypt']);
                    return this._fixedKeyInstance;
                },
                // кЄ∞л≥Є мХФнШЄнЩФ
                async encrypt(text) {
                    try {
                        const key = await this.getFixedKey();
                        const iv = crypto.getRandomValues(new Uint8Array(12));
                        const encodedText = new TextEncoder().encode(text);
                        const encryptedContent = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, encodedText);
                        const combined = new Uint8Array(iv.length + encryptedContent.byteLength);
                        combined.set(iv, 0);
                        combined.set(new Uint8Array(encryptedContent), iv.length);
                        return btoa(String.fromCharCode.apply(null, combined));
                    } catch (e) { console.error("Encryption failed:", e); return null; }
                },
                // кЄ∞л≥Є л≥µнШЄнЩФ
                async decrypt(base64String) {
                    try {
                        const key = await this.getFixedKey();
                        const combined = new Uint8Array(atob(base64String).split('').map(c => c.charCodeAt(0)));
                        const iv = combined.slice(0, 12);
                        const encryptedContent = combined.slice(12);
                        const decryptedContent = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, encryptedContent);
                        return new TextDecoder().decode(decryptedContent);
                    } catch (e) {
                        console.error("Decryption failed:", e);
                        throw new Error("Decryption failed. Data might be corrupted.");
                    }
                },
                // лєДл∞Ал≤ИнШЄ кЄ∞л∞Ш нВ§ мГЭмД±
                async deriveKeyFromPassword(password, salt) {
                    const passwordBuffer = new TextEncoder().encode(password);
                    const keyMaterial = await crypto.subtle.importKey(
                        'raw',
                        passwordBuffer,
                        { name: 'PBKDF2' },
                        false,
                        ['deriveKey']
                    );
                    return await crypto.subtle.deriveKey(
                        {
                            "name": 'PBKDF2',
                            "salt": salt,
                            "iterations": 600000,
                            "hash": 'SHA-256'
                        },
                        keyMaterial,
                        { "name": 'AES-GCM', "length": 256 },
                        true,
                        ['encrypt', 'decrypt']
                    );
                },
                // лєДл∞Ал≤ИнШЄл°Ь мХФнШЄнЩФ (л∞±мЧЕмЪ©)
                async encryptWithPassword(text, password) {
                    try {
                        const salt = crypto.getRandomValues(new Uint8Array(16));
                        const iv = crypto.getRandomValues(new Uint8Array(12));
                        const key = await this.deriveKeyFromPassword(password, salt);
                        const encodedText = new TextEncoder().encode(text);
                        const encryptedContent = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, encodedText);
                        const combined = new Uint8Array(salt.length + iv.length + encryptedContent.byteLength);
                        combined.set(salt, 0);
                        combined.set(iv, salt.length);
                        combined.set(new Uint8Array(encryptedContent), salt.length + iv.length);
                        return btoa(String.fromCharCode.apply(null, combined));
                    } catch (e) {
                        console.error("Password encryption failed:", e);
                        return null;
                    }
                },
                // лєДл∞Ал≤ИнШЄл°Ь л≥µнШЄнЩФ (л≥µмЫРмЪ©)
                async decryptWithPassword(base64String, password) {
                    try {
                        const combined = new Uint8Array(atob(base64String).split('').map(c => c.charCodeAt(0)));
                        const salt = combined.slice(0, 16);
                        const iv = combined.slice(16, 16 + 12);
                        const encryptedContent = combined.slice(16 + 12);
                        const key = await this.deriveKeyFromPassword(password, salt);
                        const decryptedContent = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, encryptedContent);
                        return new TextDecoder().decode(decryptedContent);
                    } catch (e) {
                        console.error("Password decryption failed:", e);
                        throw new Error("Decryption failed. Password might be incorrect or data corrupted.");
                    }
                }
            };

                },
                // нЩЬлПЩ л°ЬкЈЄ мґФк∞А
                async addLog(action, data = null) {

                        let logData = data;
                        if (data && (action === "CREATED" || action === "UPDATED")) {

                        localStorage.setItem("cba_we_log", logs + logEntry);
                    } catch (error) { console.error("Log recording failed:", error); }
                },
                // мШ§лЮШлРЬ л°ЬкЈЄ м†Хл¶ђ
                async pruneOldLogs() {

                    const DEFAULT_TIMEOUT = 5000;
                    const MIN_TIMEOUT = 1500;
                    const MAX_PROXIMITY = 250;
                    const MIN_PROXIMITY = 50;

                    const toastEl = document.createElement('div');
                    toastEl.className = 'custom-toast';
                    let hideTimer;

                    const removeToast = () => {
                        clearTimeout(hideTimer);
                        toastEl.classList.remove('show');
                        toastEl.addEventListener('transitionend', () => toastEl.remove(), { once: true });
                    };

                    const setDynamicTimeout = () => {
                        clearTimeout(hideTimer);
                        const containerRect = dom.toastContainer.getBoundingClientRect();
                        const inputRect = dom.textInput.getBoundingClientRect();
                        const distance = inputRect.top - containerRect.bottom;

                        let timeout = DEFAULT_TIMEOUT;
                        if (distance < MAX_PROXIMITY) {
                            const factor = Math.max(0, (distance - MIN_PROXIMITY)) / (MAX_PROXIMITY - MIN_PROXIMITY);
                            timeout = MIN_TIMEOUT + (DEFAULT_TIMEOUT - MIN_TIMEOUT) * factor;
                        }
                        hideTimer = setTimeout(removeToast, timeout);
                    };

                    toastEl.setAttribute('role', 'alert');
                    toastEl.setAttribute('aria-live', 'assertive');

                    const toastBody = document.createElement('div');

                        toastEl.addEventListener('mouseenter', () => clearTimeout(hideTimer));

                    requestAnimationFrame(() => toastEl.classList.add('show'));

            function physicsAnimate(timestamp) {
                if (!state.drag.target || !state.drag.isReordering) {
                    state.drag.animationFrameId = null;
                    return;
                }

                if (!state.drag.lastFrameTime) {
                    state.drag.lastFrameTime = timestamp;
                    state.drag.animationFrameId = requestAnimationFrame(physicsAnimate);
                    return;
                }

                const deltaTime = (timestamp - state.drag.lastFrameTime) / 1000;
                state.drag.lastFrameTime = timestamp;
                const SPRING_CONSTANT = 250;
                const DAMPING_COEFFICIENT = 20;
                const angleDifference = state.drag.angle - state.drag.targetAngle;
                const springForce = -SPRING_CONSTANT * angleDifference;
                const dampingForce = -DAMPING_COEFFICIENT * state.drag.angularVelocity;
                const totalForce = springForce + dampingForce;
                const angularAcceleration = totalForce;
                state.drag.angularVelocity += angularAcceleration * deltaTime;
                state.drag.angle += state.drag.angularVelocity * deltaTime;
                state.drag.target.style.transform = `scale(1.05) rotate(${state.drag.angle}deg)`;

                state.drag.animationFrameId = requestAnimationFrame(physicsAnimate);
            }


            function startDrag(e, target, clientX, clientY) {

                const targetRect = target.getBoundingClientRect();
                state.drag = {
                    ...state.drag,
                    target: target,
                    startX: clientX,
                    startY: clientY,
                    lastX: clientX,
                    lastY: clientY,
                    isSwiping: false,
                    isReordering: false,
                    isLongPress: false,
                    didMove: false,
                    grabOffsetX: clientX - targetRect.left,
                    grabOffsetY: clientY - targetRect.top,
                    initialWidth: targetRect.width,
                    initialHeight: targetRect.height,
                    angle: 0,
                    angularVelocity: 0,
                    targetAngle: 0,
                    lastFrameTime: null
                };

                state.drag.longPressTimer = setTimeout(() => {
                    if (!state.drag.didMove) {
                        state.drag.isLongPress = true;
                        helpers.triggerHapticFeedback('medium');
                        handlers.editPostIt(parseInt(target.dataset.id, 10));
                        resetDragState();
                    }
                }, 500);
            }

            function dragMove(e, clientX, clientY) {
                if (!state.drag.target) return;

                const deltaX = clientX - state.drag.startX;
                const deltaY = clientY - state.drag.startY;
                const MOVE_THRESHOLD = 10;

                if (!state.drag.didMove && (Math.abs(deltaX) > MOVE_THRESHOLD || Math.abs(deltaY) > MOVE_THRESHOLD)) {
                    state.drag.didMove = true;
                    clearTimeout(state.drag.longPressTimer);

                    const VERTICAL_BIAS = 1.5;
                    if (Math.abs(deltaX) > Math.abs(deltaY) * VERTICAL_BIAS) {
                        state.drag.isSwiping = true;
                        state.drag.target.classList.add('swiping');
                    } else {
                        state.drag.isReordering = true;
                        const target = state.drag.target;
                        target.style.transformOrigin = `${state.drag.grabOffsetX}px ${state.drag.grabOffsetY}px`;

                        target.style.width = `${state.drag.initialWidth}px`;
                        target.style.height = `${state.drag.initialHeight}px`;

                        const placeholder = document.createElement('div');
                        placeholder.className = 'post-it-placeholder';
                        placeholder.style.height = `${state.drag.initialHeight}px`;
                        state.drag.placeholder = placeholder;
                        const nextSibling = target.nextSibling;

                        animatePostItShift(() => {
                            dom.postItContainer.insertBefore(placeholder, nextSibling);
                            target.classList.add('dragging');
                            target.style.left = `${clientX - state.drag.grabOffsetX}px`;
                            target.style.top = `${clientY - state.drag.grabOffsetY + window.scrollY}px`;
                        });

                        document.querySelectorAll('#post-it-container .post-it:not(.dragging)').forEach(p => p.classList.add('drag-over'));

                        // (лђЉл¶ђ) мХ†лЛИл©ФмЭімЕШ л£®нФД мЛЬмЮС
                        if (!state.drag.animationFrameId) {
                            state.drag.lastFrameTime = performance.now();
                            state.drag.animationFrameId = requestAnimationFrame(physicsAnimate);
                        }
                    }
                    helpers.triggerHapticFeedback('light');
                }

                if (state.drag.didMove) {
                    if (e.cancelable) e.preventDefault();
                    if (state.drag.isSwiping) {
                        state.drag.target.style.transform = `translateX(${deltaX}px)`;
                    } else if (state.drag.isReordering) {
                        const newLeft = clientX - state.drag.grabOffsetX;
                        const newTop = clientY - state.drag.grabOffsetY + window.scrollY;

                        state.drag.target.style.left = `${newLeft}px`;
                        state.drag.target.style.top = `${newTop}px`;

                        // (лђЉл¶ђ) лУЬлЮШкЈЄ мЖНлПДмЧР лФ∞лЭЉ л™©нСЬ к∞БлПД мД§м†Х (лѓЉк∞РлПД мГБнЦ•)
                        const moveX = clientX - state.drag.lastX;
                        const moveY = clientY - state.drag.lastY;

                        const targetWidth = state.drag.target.offsetWidth;
                        const normalizedGrabX = (state.drag.grabOffsetX / targetWidth) - 0.5;
                        const angleFromX = moveX * 1.5;
                        const angleFromY = moveY * normalizedGrabX * 4;
                        const combinedAngle = angleFromX + angleFromY;
                        const maxAngle = 30;
                        state.drag.targetAngle = Math.max(-maxAngle, Math.min(maxAngle, combinedAngle));

                        state.drag.lastX = clientX;
                        state.drag.lastY = clientY;

                        const overElement = getDragOverElement(clientY);
                        if (overElement && overElement !== state.drag.placeholder) {
                            const rect = overElement.getBoundingClientRect();
                            const isAfter = clientY > rect.top + rect.height / 2;
                            const targetNode = isAfter ? overElement.nextSibling : overElement;

                            if (state.drag.placeholder.nextSibling !== targetNode) {
                                animatePostItShift(() => {
                                    dom.postItContainer.insertBefore(state.drag.placeholder, targetNode);
                                });
                            }
                        } else if (!overElement) {
                            if (state.drag.placeholder.nextSibling) {
                                animatePostItShift(() => {
                                    dom.postItContainer.appendChild(state.drag.placeholder);
                                });
                            }
                        }
                        handleAutoScroll(clientY);
                    }
                }
            }

            function animatePostItShift(moveAction) {
                const itemsToAnimate = [...dom.postItContainer.querySelectorAll('.post-it:not(.dragging)')];
                const firstPositions = new Map();
                itemsToAnimate.forEach(item => {
                    firstPositions.set(item, item.getBoundingClientRect());
                });

                moveAction();

                itemsToAnimate.forEach(item => {
                    const lastPos = item.getBoundingClientRect();
                    const firstPos = firstPositions.get(item);
                    const deltaY = firstPos.top - lastPos.top;
                    const deltaX = firstPos.left - lastPos.left;

                    if (deltaY !== 0 || deltaX !== 0) {
                        item.style.transition = 'none';
                        item.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

                        requestAnimationFrame(() => {
                            item.style.transition = 'transform 0.2s ease-out';
                            item.style.transform = '';
                        });

                        item.addEventListener('transitionend', () => {
                            item.style.transition = '';
                        }, { once: true });
                    }
                });
            }

            async function endDrag(clientX) {
                if (!state.drag.target) return;

                clearTimeout(state.drag.longPressTimer);
                clearInterval(state.drag.scrollInterval);
                const target = state.drag.target;

                // (лђЉл¶ђ) мХ†лЛИл©ФмЭімЕШ л£®нФД м§СмІА
                if (state.drag.animationFrameId) {
                    cancelAnimationFrame(state.drag.animationFrameId);
                    state.drag.animationFrameId = null;
                }

                if (state.drag.isSwiping) {
                    const deltaX = clientX - state.drag.startX;
                    const threshold = target.offsetWidth * 0.4;

                    if (Math.abs(deltaX) > threshold) {
                        const direction = deltaX > 0 ? 'right' : 'left';
                        handlers.deletePostIt(parseInt(target.dataset.id, 10), direction);
                    } else {
                        target.classList.add('returning');
                        target.style.transform = 'translateX(0)';
                        target.addEventListener('transitionend', () => {
                            target.classList.remove('returning');
                        }, { once: true });
                    }
                } else if (state.drag.isReordering) {
                    const draggedId = parseInt(target.dataset.id, 10);
                    const allItems = [...dom.postItContainer.children].filter(el => !el.classList.contains('dragging'));
                    const placeholderIndex = allItems.indexOf(state.drag.placeholder);
                    const currentDomIds = allItems.map((el, index) => {
                        if (index === placeholderIndex) {
                            return draggedId;
                        }
                        return parseInt(el.dataset.id, 10);
                    });

                    const newIdOrderForState = currentDomIds.reverse();
                    const postItsMap = new Map(state.postIts.map(p => [p.id, p]));
                    const newPostItsState = newIdOrderForState.map(id => postItsMap.get(id));

                    if (JSON.stringify(state.postIts) !== JSON.stringify(newPostItsState)) {
                        state.postIts = newPostItsState;
                        await api.saveState();
                        api.addLog("REORDERED");
                        helpers.triggerHapticFeedback('medium');
                    }

                    if (state.drag.placeholder && state.drag.placeholder.parentNode) {
                        state.drag.placeholder.parentNode.replaceChild(target, state.drag.placeholder);
                    }

                    target.classList.remove('dragging');
                    target.classList.add('returning');
                    target.style.position = '';
                    target.style.top = '';
                    target.style.left = '';
                    target.style.transform = '';
                    target.style.transformOrigin = '';

                    target.addEventListener('transitionend', () => {
                        target.classList.remove('returning');
                    }, { once: true });

                    document.querySelectorAll('#post-it-container .post-it').forEach(p => p.classList.remove('drag-over'));
                }

                if (state.drag.didMove) {
                    state.blockNextClick = true;
                    setTimeout(() => { state.blockNextClick = false; }, 100);
                }

                resetDragState();
            }

            function resetDragState() {
                if (state.drag.target) {
                    state.drag.target.classList.remove('swiping', 'active', 'dragging');
                    state.drag.target.style.position = '';
                    state.drag.target.style.top = '';
                    state.drag.target.style.left = '';
                    state.drag.target.style.width = '';
                    state.drag.target.style.height = '';
                    state.drag.target.style.transform = '';
                    state.drag.target.style.transformOrigin = '';
                }
                if (state.drag.placeholder) {
                    state.drag.placeholder.remove();
                }
                if (state.drag.animationFrameId) {
                    cancelAnimationFrame(state.drag.animationFrameId);
                }
                clearInterval(state.drag.scrollInterval);
                document.querySelectorAll('#post-it-container .post-it.drag-over').forEach(p => p.classList.remove('drag-over'));

                state.drag = {
                    target: null, startX: 0, startY: 0, lastX: 0, lastY: 0,
                    isSwiping: false, isReordering: false, isLongPress: false,
                    longPressTimer: null, didMove: false, placeholder: null, scrollInterval: null,
                    grabOffsetX: 0, grabOffsetY: 0, initialWidth: 0, initialHeight: 0,
                    angle: 0, angularVelocity: 0, targetAngle: 0, lastFrameTime: null,
                    animationFrameId: null
                };
            }

            function getDragOverElement(y) {
                const draggableElements = [...dom.postItContainer.querySelectorAll('.post-it:not(.dragging), .post-it-placeholder')];
                return draggableElements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = y - box.top - box.height / 2;
                    if (offset < 0 && offset > closest.offset) {
                        return { offset: offset, element: child };
                    } else {
                        return closest;
                    }
                }, { offset: Number.NEGATIVE_INFINITY }).element;
            }

            function handleAutoScroll(clientY) {
                const SCROLL_AREA = 60;
                const SCROLL_SPEED = 10;
                clearInterval(state.drag.scrollInterval);
                state.drag.scrollInterval = null;
                if (clientY < SCROLL_AREA) {
                    state.drag.scrollInterval = setInterval(() => { window.scrollBy(0, -SCROLL_SPEED); }, 15);
                } else if (clientY > window.innerHeight - SCROLL_AREA) {
                    state.drag.scrollInterval = setInterval(() => { window.scrollBy(0, SCROLL_SPEED); }, 15);
                }
            }

            dom.postItContainer.addEventListener('touchstart', e => {
                const touch = e.touches[0];
                startDrag(e, e.target.closest('.post-it'), touch.clientX, touch.clientY);
            }, { passive: false }); // л™®л∞ФмЭЉмЧРмДЬ 'мГИл°Ьк≥†мє®'к≥Љ лУЬлЮШкЈЄ м†ЬмК§м≤Ш мґ©лПМ л∞©мІА

            dom.postItContainer.addEventListener('touchmove', e => {
                if (!state.drag.target) return;
                const touch = e.touches[0];
                dragMove(e, touch.clientX, touch.clientY);
            }, { passive: false });

            dom.postItContainer.addEventListener('touchend', e => {
                if (!state.drag.target) return;
                const touch = e.changedTouches[0];
                endDrag(touch.clientX);
            });

            dom.postItContainer.addEventListener('mousedown', e => {
                startDrag(e, e.target.closest('.post-it'), e.clientX, e.clientY);
            });

            document.addEventListener('mousemove', e => {
                if (state.drag.target) {
                    dragMove(e, e.clientX, e.clientY);
                }
            });

            document.addEventListener('mouseup', e => {
                if (state.drag.target) {
                    endDrag(e.clientX);
                }
            });

            dom.toggleAutocopyBtn.addEventListener('click', async () => {
                state.settings.isAutoCopyEnabled = !state.settings.isAutoCopyEnabled;
                await api.saveState();
                ui.updateToggleButtons();
                ui.showToast(state.settings.isAutoCopyEnabled ? "иЗ™еЛХгВ≥гГФгГЉгБМжЬЙеКєгБЂгБ™гВКгБЊгБЧгБЯгАВ" : "иЗ™еЛХгВ≥гГФгГЉгБМзД°еКєгБЂгБ™гВКгБЊгБЧгБЯгАВ");
                helpers.triggerHapticFeedback('light');
            });
            dom.toggleNewlineBtn.addEventListener('click', async () => {
                state.settings.isNewlineEnabled = !state.settings.isNewlineEnabled;
                await api.saveState();
                ui.updateToggleButtons();
                ui.showToast(state.settings.isNewlineEnabled ? "EnterгБІжФєи°МгБЩгВЛгВИгБЖгБЂгБ™гВКгБЊгБЧгБЯгАВ" : "Shift + EnterгБЃгБњгБІжФєи°МгБЩгВЛгВИгБЖгБЂгБ™гВКгБЊгБЧгБЯгАВ");
                helpers.triggerHapticFeedback('light');
            });

            dom.scrollToTopBtn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            window.addEventListener('scroll', () => {
                const inputContainer = document.querySelector('.container.mt-3');
                if (!inputContainer) return;
                const threshold = inputContainer.offsetTop + inputContainer.offsetHeight;
                dom.scrollToTopBtn.classList.toggle('visible', window.scrollY > threshold);
                updateFooterVisibility();
            }, { passive: true });

            window.addEventListener('resize', () => {
                ui.autoResizeTextarea();
                updateFooterVisibility();
            });

            document.addEventListener('keydown', e => {
                if (state.isModalOpen) return;
                const activeElement = document.activeElement;
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                    if (activeElement === dom.textInput && dom.textInput.value === '' && state.undoableClearText) {
                        e.preventDefault();
                        handlers.restoreClearedText(state.undoableClearText);
                        state.undoableClearText = null;
                    }
                    return;
                }
                if (e.key === "Escape" && !state.isComposing) {
                    if (dom.textInput.value !== "") {
                        dom.deleteBtn.click();
                    } else if (dom.searchInput.value !== "") {
                        dom.searchClearBtn.click();
                    }
                }
            });

            window.addEventListener('beforeunload', () => {
                if (state.postIts.length > 0) {
                    localStorage.setItem('cba_we_emergency_backup', JSON.stringify(state.postIts));
                }
            });

            // м†ДмЧ≠ нД∞мєШ мЭілПЩ мЭіл≤§нКЄ л¶ђмК§лДИ (мГИл°Ьк≥†мє® л∞©мІАмЪ©)
            let initialTouchY = 0;
            document.addEventListener('touchstart', e => {
                if (e.touches.length === 1) {
                    initialTouchY = e.touches[0].clientY;
                }
            }, { passive: true });

            document.addEventListener('touchmove', e => {
                if (!state.drag.target && window.scrollY === 0) {
                    if (e.touches[0].clientY > initialTouchY) {
                        if (e.cancelable) {
                            e.preventDefault();
                        }
                    }
                }
            }, { passive: false });

            // мШ§нФИ мЖМмК§ лЭЉмЭімД†мК§ м†Хл≥і л™®лЛђ
            dom.licenseBtn.addEventListener('click', (e) => {
                e.preventDefault();
                Swal.fire({
                    title: 'Open Source Licenses',
                    html: `
                        <div style="text-align: left; font-size: 14px; max-height: 400px; overflow-y: auto; padding: 10px; background-color: var(--surface-color); border: 1px solid #777; border-radius: 4px;">
                            <h5 style="color: white; margin-bottom: 5px;">Bootstrap</h5>
                            <p style="margin-bottom: 15px;">The MIT License (MIT)<br>Copyright (c) 2011-2020 Twitter, Inc.<br>Copyright (c) 2011-2020 The Bootstrap Authors</p>
                            <h5 style="color: white; margin-bottom: 5px;">SweetAlert2</h5>
                            <p style="margin-bottom: 15px;">The MIT License (MIT)<br>Copyright (c) 2014-present Limon Monte and other contributors</p>
                            <h5 style="color: white; margin-bottom: 5px;">Bootstrap Icons</h5>
                            <p style="margin-bottom: 15px;">The MIT License (MIT)<br>Copyright (c) 2019-2024 The Bootstrap Authors</p>
                            <h5 style="color: white; margin-bottom: 5px;">Noto Sans JP</h5>
                            <p style="margin-bottom: 0;">SIL Open Font License, Version 1.1<br>Copyright 2020 The Noto Project Authors (https://github.com/notofonts/japanese)</p>
                        </div>
                    `,
                    confirmButtonText: 'йЦЙгБШгВЛ',
                    customClass: { popup: 'swal2-popup' }
                });
            });

            initialize();

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/CBA-WE/service-worker.js')
                        .then(registration => {
                            console.log('ServiceWorker registration successful with scope: ', registration.scope);
                        })
                        .catch(err => {
                            console.log('ServiceWorker registration failed: ', err);
                        });
                });
            }
        });
    </script>
